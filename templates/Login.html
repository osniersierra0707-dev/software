<!DOCTYPE html>
<html lang="es" class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CGC - Iniciar Sesión</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

  <style>
    body{
      font-family:'DM Sans',sans-serif;
    }
  </style>
</head>

<body class="h-full flex items-center justify-center bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 overflow-hidden">

  <!-- EFECTOS -->
  <div class="absolute top-0 left-0 w-72 h-72 bg-indigo-500/20 rounded-full blur-3xl"></div>
  <div class="absolute bottom-0 right-0 w-72 h-72 bg-purple-500/20 rounded-full blur-3xl"></div>

  <!-- CARD -->
  <div class="relative w-full max-w-md p-8 rounded-3xl bg-white/5 border border-white/10 backdrop-blur-xl shadow-2xl text-center">

    <!-- LOGO -->
    <div class="flex justify-center mb-6">

      <div class="relative group">

        <!-- EFECTO GLOW -->
        <div class="absolute inset-0 rounded-3xl bg-gradient-to-r from-indigo-500 to-purple-600 blur-2xl opacity-40 group-hover:opacity-70 transition duration-500"></div>

        <!-- CONTENEDOR -->
        <div class="relative bg-white/5 border border-white/10 backdrop-blur-md p-4 rounded-3xl shadow-2xl">

          <img
            src="{{ url_for('static', filename='img.png') }}"
            alt="Logo CGC"
            class="w-32 h-32 object-contain rounded-2xl transition-all duration-500 hover:scale-110">

        </div>

      </div>

    </div>

    <!-- TITULO -->
    <h1 class="text-3xl font-bold text-white mb-2"
      style="font-family:'Playfair Display', serif;">

      Gestión de Citas

    </h1>

    <p class="text-slate-400 mb-6 text-sm">
      Bienvenido al sistema CGC. Por favor, identifícate.
    </p>

    <!-- ERROR -->
    {% if error %}
      <div class="mb-4 p-3 rounded-xl bg-red-500/10 border border-red-500/30 text-red-400 text-sm animate-pulse">
        {{ error }}
      </div>
    {% endif %}

    <!-- SUCCESS -->
    {% if success %}
      <div class="mb-4 p-3 rounded-xl bg-green-500/10 border border-green-500/30 text-green-400 text-sm">
        {{ success }}
      </div>
    {% endif %}

    <!-- FORM -->
    <form action="/login" method="POST" class="space-y-5 text-left">

      <!-- ID -->
      <div class="relative">

        <span class="material-symbols-outlined absolute left-3 top-3 text-slate-500">
          badge
        </span>

        <input
          type="text"
          name="ID"
          placeholder="Número de identificación"
          required
          class="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-900/60 border border-white/10 text-white outline-none focus:ring-2 focus:ring-indigo-500 transition-all">

      </div>

      <!-- PASSWORD -->
      <div class="relative">

        <span class="material-symbols-outlined absolute left-3 top-3 text-slate-500">
          lock
        </span>

        <input
          type="password"
          name="password"
          placeholder="Contraseña"
          required
          class="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-900/60 border border-white/10 text-white outline-none focus:ring-2 focus:ring-purple-500 transition-all">

      </div>

      <!-- OLVIDÓ CONTRASEÑA -->
      <div class="text-right">
        <a href="/recuperar-password"
           class="text-sm text-indigo-400 hover:text-indigo-300 transition-colors">

          ¿Olvidaste tu contraseña?

        </a>
      </div>

      <!-- BOTON LOGIN -->
      <button
        type="submit"
        class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold shadow-lg shadow-indigo-500/20 hover:scale-[1.02] hover:shadow-indigo-500/40 transition-all duration-300">

        ENTRAR

      </button>

      <!-- DIVISOR -->
      <div class="flex items-center gap-4 my-4">

        <div class="h-[1px] flex-1 bg-white/10"></div>

        <span class="text-xs text-slate-500 uppercase">o</span>

        <div class="h-[1px] flex-1 bg-white/10"></div>

      </div>

      <!-- REGISTRO -->
      <button
        type="button"
        onclick="window.location.href='/registro'"
        class="w-full py-3 rounded-xl bg-white/5 border border-white/10 text-white font-semibold hover:bg-white/10 transition-all duration-300">

        Registrarse

      </button>

    </form>

    <!-- FOOTER -->
    <p class="text-xs text-slate-500 mt-6">
      Sistema CGC © 2026
    </p>

  </div>

</body>
</html>
