<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro - CGC</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'DM Sans',sans-serif;
    }
  </style>
</head>

<body class="bg-slate-900 text-white min-h-screen">

<header class="bg-slate-900/80 border-b border-white/10 p-4 sticky top-0 backdrop-blur-md flex items-center justify-between z-50">

  <div class="flex items-center gap-3">

    <img
      src="{{ url_for('static', filename='img.png') }}"
      class="w-14 h-14 object-contain">

    <h1 class="font-bold text-lg">
      Registro de Usuario
    </h1>

  </div>

  <a href="/"
    class="text-slate-400 hover:text-white transition-colors">

    <span class="material-symbols-outlined">
      close
    </span>

  </a>

</header>

<main class="p-6 max-w-lg mx-auto">

  <div class="bg-white/5 border border-white/10 p-8 rounded-3xl backdrop-blur-lg shadow-xl">

    <!-- ERROR -->
{% if error %}
  <div class="mb-4 p-3 rounded-xl bg-red-500/10 border border-red-500/30 text-red-400 text-sm">
    {{ error }}
  </div>
{% endif %}
<!-- SUCCESS -->
{% if success %}
  <div class="mb-4 p-3 rounded-xl bg-green-500/10 border border-green-500/30 text-green-400 text-sm">
    {{ success }}
  </div>
{% endif %}
    <form action="/registro_api" method="POST" class="space-y-4">

      <input type="text" name="nombre" placeholder="Nombres"
        class="w-full p-3 bg-slate-950 border border-white/10 rounded-xl outline-none focus:border-indigo-500"
        required>

      <input type="text" name="apellido" placeholder="Apellidos"
        class="w-full p-3 bg-slate-950 border border-white/10 rounded-xl outline-none focus:border-indigo-500"
        required>

      <input type="text" name="ID" placeholder="Documento de Identidad"
        class="w-full p-3 bg-slate-950 border border-white/10 rounded-xl outline-none focus:border-indigo-500"
        required>

      <input type="email" name="email" placeholder="Correo electrónico"
        class="w-full p-3 bg-slate-950 border border-white/10 rounded-xl outline-none focus:border-indigo-500"
        required>

      <input type="password" name="password" placeholder="Contraseña"
        class="w-full p-3 bg-slate-950 border border-white/10 rounded-xl outline-none focus:border-indigo-500"
        required>

      <input type="text" name="telefono" placeholder="Número de teléfono"
        class="w-full p-3 bg-slate-950 border border-white/10 rounded-xl outline-none focus:border-indigo-500"
        required>

      <input type="text" name="direccion" placeholder="Dirección"
        class="w-full p-3 bg-slate-950 border border-white/10 rounded-xl outline-none focus:border-indigo-500"
        required>

      <button
        type="submit"
        class="w-full bg-indigo-600 py-4 rounded-2xl font-bold mt-4 hover:bg-indigo-500 hover:shadow-lg hover:shadow-indigo-500/30 transition-all">

        FINALIZAR REGISTRO

      </button>

    </form>

  </div>

</main>

</body>
</html>
